name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Commitlint, build and test
    if: >-
      (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch) ||
      (github.event_name == 'pull_request' && github.base_ref == github.event.repository.default_branch)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: .\apps\desktop\package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            .\apps\desktop\src-tauri -> apps/desktop/src-tauri/target

      - name: Validate commit messages
        shell: pwsh
        run: |
          $range = if ('${{ github.event_name }}' -eq 'pull_request') {
            "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          }
          elseif ('${{ github.event.before }}' -and '${{ github.event.before }}' -ne '0000000000000000000000000000000000000000') {
            "${{ github.event.before }}..${{ github.sha }}"
          }
          else {
            "${{ github.sha }}^..${{ github.sha }}"
          }

          npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint --from $range.Split('..')[0] --to $range.Split('..')[1] --verbose

      - name: Install desktop dependencies
        shell: pwsh
        run: npm ci --prefix .\apps\desktop

      - name: Test Rust workspace
        shell: pwsh
        run: cargo test

      - name: Build desktop frontend
        shell: pwsh
        run: npm run frontend:build --prefix .\apps\desktop

      - name: Build desktop smoke package
        shell: pwsh
        run: npm run build --prefix .\apps\desktop -- --no-bundle --config .\src-tauri\tauri.conf.json

      - name: Smoke CLI help
        shell: pwsh
        run: cargo run -p nulmesis-cli -- --help
